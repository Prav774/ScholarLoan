{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root { --card-bg: #ffffff; --text:#111; --accent:#2563eb; --error:#dc2626; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      /* subtle animated gradient (no images, no extra urls) */
      background: linear-gradient(120deg, #eef2ff, #fdf2f8, #ecfeff);
      background-size: 300% 300%;
      animation: bgMove 12s ease infinite;
    }
    @keyframes bgMove {
      0%,100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    .card {
      width: 92%;
      max-width: 380px;
      background: var(--card-bg);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
      transition: transform .2s ease;
    }
    .card:hover { transform: translateY(-2px); }
    h2 { margin: 0 0 16px; font-size: 1.4rem; }
    .messages {
      margin: 0 0 12px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #fee2e2;
      color: var(--error);
      font-size: .95rem;
    }
    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: 600;
      font-size: .9rem;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      outline: none;
      font-size: 1rem;
      transition: border-color .15s ease, box-shadow .15s ease;
      background: #fff;
    }
    input:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(59,130,246,.15);
    }
    button[type="submit"] {
      width: 100%;
      margin-top: 16px;
      padding: 12px 14px;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
      font-weight: 700;
      letter-spacing: .2px;
      transition: transform .08s ease, filter .2s ease;
    }
    button[type="submit"]:active { transform: translateY(1px); }
    .foot {
      margin-top: 10px;
      font-size: .85rem;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <main class="card">
    <h2>Login</h2>

    {# Django messages (errors etc.) #}
    {% if messages %}
      <div id="msgbox" class="messages">
        {% for message in messages %}
          <div>{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}

    {# POST to the SAME URL. You said no extra url — so action is empty. #}
    <form method="POST" action="">
      {% csrf_token %}

      <label for="id_username">Username</label>
      <input id="id_username" name="username" type="text" required autocomplete="username" />

      <label for="id_password">Password</label>
      <input id="id_password" name="password" type="password" required autocomplete="current-password" />

      <button type="submit">Sign in</button>
      <div class="foot">Use your app credentials.</div>
    </form>
  </main>

  <script>
    // Auto-hide messages after 3s (targets the right box, not the first random div)
    window.addEventListener("DOMContentLoaded", () => {
      const box = document.getElementById("msgbox");
      if (box) setTimeout(() => box.style.display = "none", 3000);
    });
  </script>
</body>
</html>
